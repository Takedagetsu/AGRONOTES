<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroNotes | Login de Acesso</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="./scr/styles/style.css">
</head>
<body>

    <video autoplay loop muted playsinline id="video-bg">
        <source src="./scr/midia/Ppt background environment _ Environmental gif_ Coding environment inspiration_ Technology and nature(MP4).mp4" type="video/mp4">
        Seu navegador não suporta vídeos em HTML5.
    </video>

    <div class="app-card login-card">
        <header class="header">
            <div class="header-center">
                <span class="badge">🌱 AgroNotes</span>
                <h1>Acesso ao Caderno</h1>
            </div>
        </header>

        <main class="editor-area">
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="usuario">Usuário / ID Agrônomo:</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário..." required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="senha">Senha de Acesso:</label>
                    <input type="password" id="senha" placeholder="Digite sua senha..." required>
                </div>

                <button type="submit" class="btn-login">🔓 Entrar no Sistema</button>
            </form>
        </main>
    </div>

    <script>
        // CONFIGURAÇÕES DE CREDENCIAIS
        const ID_CORRETO = "06869";      // <-- Altere aqui o seu ID Agrônomo
        const SENHA_CORRETA = "Takedaa21*"; // <-- Altere aqui a sua Senha

        const form = document.getElementById('loginForm');
        const inputUsuario = document.getElementById('usuario');
        const inputSenha = document.getElementById('senha');

        // Se já estiver logado, vai direto para o caderno principal
        if (localStorage.getItem('agronotes_autenticado') === 'true') {
            window.location.href = 'index.html';
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const usuarioDigitado = inputUsuario.value.trim();
            const senhaDigitada = inputSenha.value;

            if (usuarioDigitado === ID_CORRETO && senhaDigitada === SENHA_CORRETA) {
                localStorage.setItem('agronotes_autenticado', 'true');
                window.location.href = 'index.html';
            } else {
                alert('❌ ID Agrônomo ou Senha incorretos. Tente novamente!');
                inputSenha.value = '';
                inputSenha.focus();
            }
        });
    </script>
</body>
</html>
